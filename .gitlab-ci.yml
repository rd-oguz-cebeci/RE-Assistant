# GitLab CI/CD – baut die App und veröffentlicht sie auf GitLab Pages.
# Pages erwartet die fertigen Dateien im Verzeichnis "public" (per vite.config.ts so konfiguriert).

stages:
  - build
  - deploy

default:
  image: node:20-alpine
  cache:
    key:
      files:
        - package-lock.json
    paths:
      - node_modules/

# Lint + Typecheck + Build als Qualitäts-Gate für jeden Merge Request.
build:
  stage: build
  variables:
    # GitLab Pages serviert das Projekt unter /<projektname>/.
    PAGES_BASE: "/$CI_PROJECT_NAME/"
  script:
    - npm ci
    - npm run lint
    - npm run build
  artifacts:
    paths:
      - public
    expire_in: 1 week

# Deploy nach GitLab Pages – nur auf dem Default-Branch.
pages:
  stage: deploy
  variables:
    PAGES_BASE: "/$CI_PROJECT_NAME/"
  script:
    - npm ci
    - npm run build
  artifacts:
    paths:
      - public
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
